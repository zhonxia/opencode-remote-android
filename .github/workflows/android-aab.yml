name: Build Android AAB (Play Store)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
        working-directory: web

      - name: Generate Android app icon assets
        run: npx @capacitor/assets generate --android --assetPath public --iconBackgroundColor '#0b1020' --iconBackgroundColorDark '#0b1020'
        working-directory: web

      - name: Sync Capacitor project
        run: npx cap sync android
        working-directory: web

      - name: Enable R8
        run: |
          sed -i 's/minifyEnabled false/minifyEnabled true/' web/android/app/build.gradle

      - name: Read app version
        id: version
        run: |
          APP_VERSION=$(node -p "require('./web/package.json').version")
          VERSION_CODE=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log((major * 10000) + (minor * 100) + patch)" "$APP_VERSION")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Sync Android version metadata
        run: node web/scripts/sync-android-version.mjs "${{ steps.version.outputs.app_version }}" "${{ steps.version.outputs.version_code }}"

      - name: Build release AAB (unsigned)
        run: ./gradlew bundleRelease --stacktrace --no-daemon
        working-directory: web/android

      - name: Decode Android release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > web/android/release.keystore

      - name: Sign release AAB
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        run: |
          jarsigner \
            -keystore web/android/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar web/android/app/build/outputs/bundle/release/app-release-signed.aab \
            web/android/app/build/outputs/bundle/release/app-release.aab \
            "$ANDROID_KEY_ALIAS"

      - name: Select AAB path
        id: aab
        run: |
          if [ -f web/android/app/build/outputs/bundle/release/app-release-signed.aab ]; then
            echo "path=web/android/app/build/outputs/bundle/release/app-release-signed.aab" >> "$GITHUB_OUTPUT"
            echo "name=app-release-signed.aab" >> "$GITHUB_OUTPUT"
          else
            echo "path=web/android/app/build/outputs/bundle/release/app-release.aab" >> "$GITHUB_OUTPUT"
            echo "name=app-release.aab" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-remote-aab-v${{ steps.version.outputs.app_version }}
          path: ${{ steps.aab.outputs.path }}
